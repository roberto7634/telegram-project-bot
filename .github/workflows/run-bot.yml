name: run-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install library
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: |
          timeout 300 python bot.py
